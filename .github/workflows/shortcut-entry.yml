name: Add Shortcut Entry

on:
  repository_dispatch:
    types: [dudu-add-entry]

permissions:
  contents: write

jobs:
  append-entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Append entry
        run: node scripts/append-entry.js
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
      - name: Commit data update
        run: |
          if [ -z "$(git status --porcelain data/entries.json)" ]; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/entries.json
          git commit -m "Add shortcut entry"
          git push
